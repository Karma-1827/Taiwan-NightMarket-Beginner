<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夜市對對碰 - 華語學習遊戲</title>
    <style>
        :root {
            --bg-color: #fdf5e6;
            --card-back: #b22222;
            --card-front: #ffffff;
            --text-color: #3e2723;
        }

        body {
            background-color: var(--bg-color);
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            color: var(--text-color);
        }

        h1 { color: #8b0000; margin-bottom: 10px; }
        .instructions { margin-bottom: 20px; font-size: 1.1em; text-align: center; line-height: 1.6;}

        .game-container {
            display: grid;
            grid-template-columns: repeat(5, 120px);
            grid-gap: 15px;
            perspective: 1000px;
        }

        @media (max-width: 650px) {
            .game-container { grid-template-columns: repeat(3, 100px); }
        }

        .card {
            width: 120px;
            height: 150px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            cursor: pointer;
        }

        .card.flipped { transform: rotateY(180deg); }
        .card.matched { cursor: default; visibility: visible; opacity: 0.8; }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border: 2px solid #d32f2f;
        }

        .card-back {
            background-color: var(--card-back);
            background-image: radial-gradient(circle, #d32f2f 10%, transparent 10%);
            background-size: 20px 20px;
        }

        .card-front {
            background-color: var(--card-front);
            transform: rotateY(180deg);
            padding: 10px;
            text-align: center;
            box-sizing: border-box;
        }

        .card-front img {
            max-width: 90%;
            max-height: 70%;
            object-fit: contain;
        }

        .card-front .word { font-size: 1.2em; font-weight: bold; margin-top: 5px; }
        .card-front .pinyin { font-size: 0.9em; color: #666; }

        #feedback-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            text-align: center;
            z-index: 100;
            border: 5px solid #ffcc00;
        }

        #feedback-modal h2 { color: #d32f2f; font-size: 2em; }
        button {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            margin-top: 10px;
        }

        #match-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 0 30px rgba(0,0,0,0.4);
            text-align: center;
            z-index: 200;
            border: 6px solid #ffcc00;
            width: 280px;
        }
        
        #match-popup img {
            width: 180px;
            height: 180px;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .popup-word {
            font-size: 2.2em;
            font-weight: bold;
            color: #d32f2f;
            margin: 5px 0;
        }
        
        .popup-pinyin {
            font-size: 1.1em;
            color: #555;
        }
    </style>
</head>
<body>

    <h1>🏮 臺灣夜市對對碰 🏮</h1>
    <p class="instructions">
        請將「圖片」與正確的「生詞」配對<br>
        Please match the "images" with the correct "vocabulary".
    </p>

    <div class="game-container" id="game-board"></div>

    <div id="match-popup">
        <img id="popup-img" src="" alt="match">
        <div id="popup-word" class="popup-word"></div>
        <div id="popup-pinyin" class="popup-pinyin"></div>
    </div>

    <div id="feedback-modal">
        <h2 id="feedback-text">太棒了！</h2>
        <button onclick="resetGame()">再玩一次</button>
    </div>

    <script>
        const items = [
            { id: 1, name: '夜市', pinyin: 'yè shì', img: 'https://i.postimg.cc/TYBqB83g/20230921093117-b34ba6ac-me.jpg' },
            { id: 2, name: '小吃', pinyin: 'xiǎo chī', img: 'https://i.postimg.cc/1X2wx6Pd/00000_12.jpg' },
            { id: 3, name: '老闆', pinyin: 'lǎo bǎn', img: 'https://i.postimg.cc/xCg3ZcX2/xia-zai.jpg' },
            { id: 4, name: '雞排', pinyin: 'jī pái', img: 'https://i.postimg.cc/D0yBf194/b193016e7b200014.jpg' },
            { id: 5, name: '珍珠奶茶', pinyin: 'zhēn zhū nǎi chá', img: 'https://i.postimg.cc/85khLNtR/34.jpg' }
        ];

        let flippedCards = [];
        let matchedCount = 0;
        let isLocked = false; 

        function initGame() {
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            matchedCount = 0;
            flippedCards = [];
            isLocked = false;
            
            const cardData = [
                ...items.map(item => ({ ...item, type: 'img' })),
                ...items.map(item => ({ ...item, type: 'text' }))
            ].sort(() => Math.random() - 0.5);

            cardData.forEach((data) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.id = data.id;
                card.dataset.name = data.name;
                
                card.innerHTML = `
                    <div class="card-face card-back"></div>
                    <div class="card-face card-front">
                        ${data.type === 'img' 
                            ? `<img src="${data.img}" alt="${data.name}">` 
                            : `<div class="word">${data.name}</div><div class="pinyin">${data.pinyin}</div>`}
                    </div>
                `;
                
                card.addEventListener('click', () => flipCard(card));
                board.appendChild(card);
            });
        }

        function flipCard(card) {
            if (isLocked) return; 
            if (flippedCards.length < 2 && !card.classList.contains('flipped') && !card.classList.contains('matched')) {
                card.classList.add('flipped');
                flippedCards.push(card);

                if (flippedCards.length === 2) {
                    checkMatch();
                }
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            const isMatch = card1.dataset.id === card2.dataset.id;
        
            if (isMatch) {
                isLocked = true; 
                card1.classList.add('matched');
                card2.classList.add('matched');
        
                const itemData = items.find(it => it.id == card1.dataset.id);
                
                const popup = document.getElementById('match-popup');
                document.getElementById('popup-img').src = itemData.img;
                document.getElementById('popup-word').innerText = itemData.name;
                document.getElementById('popup-pinyin').innerText = itemData.pinyin;
                
                popup.style.display = 'block';
                speak(itemData.name); 
        
                setTimeout(() => {
                    popup.style.display = 'none';
                    isLocked = false;
                    flippedCards = [];
                    matchedCount++;
                    if (matchedCount === items.length) {
                        setTimeout(showWinMessage, 500);
                    }
                }, 5000);
        
            } else {
                isLocked = true;
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    isLocked = false;
                }, 1000);
            }
        }

        function speak(text) {
            const synth = window.speechSynthesis;
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'zh-TW';
            synth.speak(utter);
        }

        function showWinMessage() {
            document.getElementById('feedback-modal').style.display = 'block';
            speak("太棒了！");
        }

        function resetGame() {
            document.getElementById('feedback-modal').style.display = 'none';
            initGame();
        }

        initGame();
    </script>
</body>
</html>
