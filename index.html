<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夜市點餐對對碰 - 華語學習遊戲</title>
    <style>
        :root {
            --bg-color: #fdf5e6;
            --card-back: #b22222;
            --card-front: #ffffff;
            --text-color: #3e2723;
            --highlight: #ffcc00;
        }

        body {
            background-color: var(--bg-color);
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            color: var(--text-color);
        }

        h1 { color: #8b0000; margin-bottom: 5px; }
        
        .instructions { 
            margin-bottom: 25px; 
            font-size: 1.2em; 
            text-align: center;
            line-height: 1.6;
        }
        .instructions span {
            display: block;
            font-size: 0.85em;
            color: #5d4037;
        }

        .game-container {
            display: grid;
            grid-template-columns: repeat(5, 160px); 
            grid-gap: 20px;
            perspective: 1000px;
        }

        @media (max-width: 900px) {
            .game-container { grid-template-columns: repeat(2, 160px); }
        }

        .card {
            width: 160px;
            height: 220px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
            cursor: pointer;
        }

        .card.flipped { transform: rotateY(180deg); }
        .card.matched { cursor: default; opacity: 0.4; }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            border: 3px solid #d32f2f;
        }

        .card-back {
            background-color: var(--card-back);
            background-image: radial-gradient(circle, #d32f2f 10%, transparent 10%);
            background-size: 25px 25px;
        }

        .card-front {
            background-color: var(--card-front);
            transform: rotateY(180deg);
            padding: 10px;
            text-align: center;
            box-sizing: border-box;
        }

        .card-front img {
            max-width: 100%;
            max-height: 70%;
            object-fit: contain;
        }

        .card-front .word { font-size: 1.5em; font-weight: bold; margin-top: 10px; }
        .card-front .pinyin { font-size: 1em; color: #666; }

        #match-popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            text-align: center;
            z-index: 200;
            border: 8px solid var(--highlight);
            width: 320px;
        }

        #match-popup img { width: 180px; height: 180px; object-fit: contain; }
        #match-popup .popup-word { font-size: 2.5em; font-weight: bold; color: #d32f2f; margin: 10px 0; }

        #win-modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            z-index: 100;
            border: 5px solid #ffcc00;
        }

        button {
            background: #d32f2f;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2em;
        }
    </style>
</head>
<body>

    <h1>🏮 臺灣夜市對對碰 🏮</h1>
    <p class="instructions">
        請將「圖片」與正確的「生詞」配對
        <span>Please match the "images" with the correct "vocabulary".</span>
    </p>

    <div class="game-container" id="game-board"></div>

    <div id="match-popup">
        <img id="popup-img" src="" alt="">
        <div id="popup-word" class="popup-word"></div>
        <div id="popup-pinyin" style="font-size: 1.2em; color: #555;"></div>
    </div>

    <div id="win-modal">
        <h2>太棒了！</h2>
        <button onclick="resetGame()">再玩一次</button>
    </div>

    <script>
        [cite_start]// 使用您的教材資料 [cite: 72-76, 92-95]
        // 註：img 路徑請確保您的資料夾中有對應檔案，或暫時使用網址測試
        const items = [
            { id: 1, name: '夜市', pinyin: 'yè shì', img: 'https://placehold.jp/40/8b0000/ffffff/200x200.png?text=夜市' },
            { id: 2, name: '小吃', pinyin: 'xiǎo chī', img: 'https://placehold.jp/40/8b0000/ffffff/200x200.png?text=小吃' },
            { id: 3, name: '老闆', pinyin: 'lǎo bǎn', img: 'https://placehold.jp/40/8b0000/ffffff/200x200.png?text=老闆' },
            { id: 4, name: '雞排', pinyin: 'jī pái', img: 'https://placehold.jp/40/8b0000/ffffff/200x200.png?text=雞排' },
            { id: 5, name: '珍珠奶茶', pinyin: 'zhēn zhū nǎi chá', img: 'https://placehold.jp/40/8b0000/ffffff/200x200.png?text=珍奶' }
        ];

        let flippedCards = [];
        let matchedCount = 0;
        let isProcessing = false;

        function initGame() {
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            matchedCount = 0;
            flippedCards = [];
            isProcessing = false;
            
            const cardData = [
                ...items.map(item => ({ ...item, type: 'img' })),
                ...items.map(item => ({ ...item, type: 'text' }))
            ].sort(() => Math.random() - 0.5);

            cardData.forEach(data => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.id = data.id;
                
                card.innerHTML = `
                    <div class="card-face card-back"></div>
                    <div class="card-face card-front">
                        ${data.type === 'img' 
                            ? `<img src="${data.img}" alt="${data.name}">` 
                            : `<div class="word">${data.name}</div><div class="pinyin">${data.pinyin}</div>`}
                    </div>
                `;
                
                card.addEventListener('click', () => {
                    if (isProcessing) return;
                    if (!card.classList.contains('flipped') && !card.classList.contains('matched')) {
                        card.classList.add('flipped');
                        flippedCards.push({ card, data });
                        if (flippedCards.length === 2) checkMatch();
                    }
                });
                board.appendChild(card);
            });
        }

        function checkMatch() {
            const [c1, c2] = flippedCards;
            if (c1.card.dataset.id === c2.card.dataset.id) {
                isProcessing = true;
                c1.card.classList.add('matched');
                c2.card.classList.add('matched');
                
                // 顯示回饋視窗 (5秒)
                const info = c1.data;
                const popup = document.getElementById('match-popup');
                document.getElementById('popup-img').src = info.img;
                document.getElementById('popup-word').innerText = info.name;
                document.getElementById('popup-pinyin').innerText = info.pinyin;
                
                popup.style.display = 'block';
                speak(info.name);

                setTimeout(() => {
                    popup.style.display = 'none';
                    isProcessing = false;
                    matchedCount++;
                    if (matchedCount === items.length) showWinMessage();
                }, 5000);
                flippedCards = [];
            } else {
                isProcessing = true;
                setTimeout(() => {
                    c1.card.classList.remove('flipped');
                    c2.card.classList.remove('flipped');
                    flippedCards = [];
                    isProcessing = false;
                }, 1000);
            }
        }

        function speak(text) {
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-TW';
            window.speechSynthesis.speak(msg);
        }

        function showWinMessage() {
            document.getElementById('win-modal').style.display = 'block';
            speak("太棒了！");
        }

        function resetGame() {
            document.getElementById('win-modal').style.display = 'none';
            initGame();
        }

        initGame();
    </script>
</body>
</html>
